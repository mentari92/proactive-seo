global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, service]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: ['severity="critical"']
      receiver: critical
      repeat_interval: 30m
    - matchers: ['severity="warning"']
      receiver: warning

receivers:
  - name: default
  - name: warning
  - name: critical

inhibit_rules:
  - source_matchers: ['severity="critical"']
    target_matchers: ['severity=~"warning|info"']
    equal: [alertname, service]

