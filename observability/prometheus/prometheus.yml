global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels: {platform: proactive-seo, environment: local}

rule_files: [/etc/prometheus/rules.yml]

alerting:
  alertmanagers:
    - static_configs: [{targets: ["alertmanager:9093"]}]

scrape_configs:
  - job_name: proactive-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000
          - auth-service:8000
          - tenant-service:8000
          - keyword-service:8000
          - crawl-service:8000
          - content-service:8000
          - rank-tracker-service:8000
          - serp-monitor-service:8000
          - analytics-service:8000
          - notification-service:8000
          - billing-service:8000
          - report-service:8000
          - link-analysis-service:8000
          - ai-service:8000
          - audit-service:8000
  - job_name: prometheus
    static_configs: [{targets: ["localhost:9090"]}]

