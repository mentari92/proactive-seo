{{- range .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  labels: {app.kubernetes.io/name: {{ .name }}, app.kubernetes.io/part-of: proactive-seo}
spec:
  replicas: {{ .replicas }}
  strategy: {type: RollingUpdate, rollingUpdate: {maxUnavailable: 0, maxSurge: 1}}
  selector: {matchLabels: {app.kubernetes.io/name: {{ .name }}}}
  template:
    metadata:
      labels: {app.kubernetes.io/name: {{ .name }}, app.kubernetes.io/part-of: proactive-seo}
      annotations: {prometheus.io/scrape: "true", prometheus.io/port: "8000", prometheus.io/path: /metrics}
    spec:
      serviceAccountName: proactive-seo
      automountServiceAccountToken: false
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      topologySpreadConstraints:
        - {maxSkew: 1, topologyKey: topology.kubernetes.io/zone, whenUnsatisfiable: ScheduleAnyway, labelSelector: {matchLabels: {app.kubernetes.io/name: {{ .name }}}}}
      containers:
        - name: app
          image: "{{ $.Values.image.backend }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports: [{name: http, containerPort: 8000}]
          env:
            - {name: APP_SERVICE_NAME, value: {{ .name | quote }}}
            - {name: APP_ENV, value: {{ $.Values.global.environment | quote }}}
            - {name: OTEL_EXPORTER_OTLP_ENDPOINT, value: {{ $.Values.global.otelEndpoint | quote }}}
          envFrom:
            - {configMapRef: {name: {{ $.Values.global.configMapName }}}}
            - {secretRef: {name: {{ $.Values.global.secretName }}}}
          resources:
            requests: {cpu: {{ .cpu | quote }}, memory: {{ .memory | quote }}}
            limits: {cpu: {{ .cpu | quote }}, memory: {{ .memory | quote }}}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: [ALL]}
          volumeMounts: [{name: tmp, mountPath: /tmp}]
          livenessProbe: {httpGet: {path: /health, port: http}, periodSeconds: 15, failureThreshold: 3}
          readinessProbe: {httpGet: {path: /health/ready, port: http}, periodSeconds: 10, failureThreshold: 3}
          startupProbe: {httpGet: {path: /health/startup, port: http}, periodSeconds: 10, failureThreshold: 30}
      volumes: [{name: tmp, emptyDir: {sizeLimit: 128Mi}}]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  labels: {app.kubernetes.io/name: {{ .name }}, app.kubernetes.io/part-of: proactive-seo}
spec:
  selector: {app.kubernetes.io/name: {{ .name }}}
  ports: [{name: http, port: {{ .port }}, targetPort: http}]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: {name: {{ .name }}}
spec:
  minAvailable: 1
  selector: {matchLabels: {app.kubernetes.io/name: {{ .name }}}}
{{- if $.Values.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: {name: {{ .name }}}
spec:
  scaleTargetRef: {apiVersion: apps/v1, kind: Deployment, name: {{ .name }}}
  minReplicas: {{ $.Values.autoscaling.minReplicas }}
  maxReplicas: {{ $.Values.autoscaling.maxReplicas }}
  behavior:
    scaleDown: {stabilizationWindowSeconds: 300}
    scaleUp: {stabilizationWindowSeconds: 30}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: {type: Utilization, averageUtilization: {{ $.Values.autoscaling.cpuUtilization }}}
{{- end }}
{{- end }}

