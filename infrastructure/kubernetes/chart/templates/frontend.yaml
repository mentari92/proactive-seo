apiVersion: apps/v1
kind: Deployment
metadata: {name: web, labels: {app.kubernetes.io/name: web, app.kubernetes.io/part-of: proactive-seo}}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector: {matchLabels: {app.kubernetes.io/name: web}}
  template:
    metadata: {labels: {app.kubernetes.io/name: web, app.kubernetes.io/part-of: proactive-seo}}
    spec:
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: web
          image: "{{ .Values.image.frontend }}:{{ .Values.image.tag }}"
          ports: [{name: http, containerPort: 3000}]
          env: [{name: INTERNAL_API_URL, value: "http://api-gateway:8000"}]
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          resources: {requests: {cpu: 250m, memory: 256Mi}, limits: {cpu: 500m, memory: 512Mi}}
          livenessProbe: {httpGet: {path: /overview, port: http}, periodSeconds: 15}
          readinessProbe: {httpGet: {path: /overview, port: http}, periodSeconds: 10}
---
apiVersion: v1
kind: Service
metadata: {name: web}
spec: {selector: {app.kubernetes.io/name: web}, ports: [{name: http, port: 80, targetPort: http}]}
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proactive-seo
  annotations: {nginx.ingress.kubernetes.io/proxy-body-size: 10m}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend: {service: {name: api-gateway, port: {number: 8000}}}
          - path: /
            pathType: Prefix
            backend: {service: {name: web, port: {number: 80}}}
{{- end }}
